<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | بطلي</title>
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
body{background:var(--clr-cream);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:var(--clr-paper);box-shadow:var(--shadow-soft);}
.wrap{max-width:1180px;margin:0 auto;padding:24px;}
.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tab-btn{padding:10px 20px;border-radius:100px;font-weight:800;font-size:.9rem;background:var(--clr-paper);color:var(--clr-ink-soft);}
.tab-btn.active{background:var(--clr-primary);color:#fff;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:26px;}
.stat-card{background:var(--clr-paper);border-radius:16px;padding:18px;text-align:center;box-shadow:var(--shadow-soft);}
.stat-card .num{font-size:1.6rem;font-weight:900;color:var(--clr-primary);}
.stat-card .lbl{font-size:.78rem;color:var(--clr-ink-soft);margin-top:4px;}
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input,.toolbar select{width:auto;flex:1;min-width:160px;}
.overlay{position:fixed;inset:0;background:rgba(20,12,8,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--clr-paper);border-radius:20px;max-width:600px;width:100%;max-height:86vh;overflow-y:auto;padding:26px;}
.detail-row{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid color-mix(in srgb, var(--clr-ink) 8%, transparent);font-size:.9rem;}
.detail-row b{color:var(--clr-ink-soft);font-weight:600;flex-shrink:0;}
.new-badge{background:var(--clr-primary);color:#fff;font-size:.68rem;font-weight:800;padding:2px 9px;border-radius:100px;margin-inline-start:6px;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.chart-card{background:var(--clr-paper);border-radius:16px;padding:20px;box-shadow:var(--shadow-soft);}
.chart-card h4{font-size:.92rem;margin-bottom:14px;}
.products-grid-admin{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.product-card-admin{background:var(--clr-paper);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-soft);}
.product-card-admin img{width:100%;height:130px;object-fit:cover;background:var(--clr-cream);}
.product-card-admin .pc-body{padding:14px;}
.product-card-admin.inactive{opacity:.5;}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(3,1fr);} .charts-grid{grid-template-columns:1fr;} .products-grid-admin{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" style="margin:0;">📖 <span>لوحة تحكم بطلي</span></div>
  <button class="btn btn-outline" id="logoutBtn">تسجيل الخروج</button>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" data-tab="ordersTab">الطلبات</button>
    <button class="tab-btn" data-tab="productsTab">المنتجات</button>
    <button class="tab-btn" data-tab="statsTab">الإحصائيات والتسويق</button>
  </div>

  <!-- ===================== تبويب الطلبات ===================== -->
  <div class="tab-panel active" id="ordersTab">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="card">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="ابحث برقم الطلب / الاسم / الجوال">
        <select id="statusFilter"><option value="">كل الحالات</option></select>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>رقم الطلب</th><th>العميل</th><th>الطفل</th><th>المنتج</th><th>التاريخ</th><th>الحالة</th><th></th></tr></thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===================== تبويب المنتجات ===================== -->
  <div class="tab-panel" id="productsTab">
    <div class="card" style="margin-bottom:20px;">
      <button class="btn" id="addProductBtn">+ إضافة منتج جديد</button>
    </div>
    <div class="products-grid-admin" id="productsGridAdmin"></div>
  </div>

  <!-- ===================== تبويب الإحصائيات ===================== -->
  <div class="tab-panel" id="statsTab">
    <div class="card">
      <h3 style="margin-bottom:14px;">فلترة الطلبات</h3>
      <div class="toolbar">
        <input type="text" id="fName" placeholder="اسم الطفل أو ولي الأمر">
        <select id="fAge"><option value="">كل الأعمار</option></select>
        <select id="fGender"><option value="">كل الأجناس</option><option value="ولد">ولد</option><option value="بنت">بنت</option></select>
        <input type="text" id="fCity" placeholder="المدينة">
        <select id="fValue"><option value="">كل القيم</option></select>
      </div>
      <p style="font-size:.85rem;color:var(--clr-ink-soft);">عدد النتائج المطابقة: <b id="filterCount">0</b></p>
    </div>

    <div class="charts-grid">
      <div class="chart-card"><h4>توزيع الجنس</h4><canvas id="chartGender"></canvas></div>
      <div class="chart-card"><h4>توزيع الأعمار</h4><canvas id="chartAge"></canvas></div>
      <div class="chart-card"><h4>أكثر المدن</h4><canvas id="chartCity"></canvas></div>
      <div class="chart-card"><h4>أكثر القيم المطلوبة</h4><canvas id="chartValue"></canvas></div>
      <div class="chart-card"><h4>الطلبات حسب يوم الأسبوع</h4><canvas id="chartWeekday"></canvas></div>
      <div class="chart-card"><h4>الطلبات حسب الشهر</h4><canvas id="chartMonth"></canvas></div>
    </div>
  </div>
</div>

<div class="overlay" id="detailOverlay"><div class="modal" id="detailModal"></div></div>
<div class="overlay" id="productOverlay"><div class="modal" id="productModal"></div></div>

<script src="../shared/config.js"></script>
<script src="../shared/drive-upload.js"></script>
<script>
let allOrders = [];
let allProducts = [];
let charts = {};

supabaseClient.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return; }
  init();
});
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
  window.location.href = 'login.html';
});

/* التبويبات */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'statsTab') renderCharts();
  });
});

function init() {
  const filterEl = document.getElementById('statusFilter');
  Object.entries(STATUS_LABELS).forEach(([key, label]) => {
    const opt = document.createElement('option'); opt.value = key; opt.textContent = label;
    filterEl.appendChild(opt);
  });
  const fAge = document.getElementById('fAge');
  for (let a = 2; a <= 13; a++) { const o = document.createElement('option'); o.value = a; o.textContent = a + ' سنوات'; fAge.appendChild(o); }

  loadOrders();
  loadProducts();

  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('statusFilter').addEventListener('change', renderTable);
  ['fName','fAge','fGender','fCity','fValue'].forEach(id => document.getElementById(id).addEventListener('input', renderCharts));

  supabaseClient.channel('orders-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, loadOrders).subscribe();

  document.getElementById('addProductBtn').addEventListener('click', () => openProductForm(null));
}

/* ===================== الطلبات ===================== */
async function loadOrders() {
  const { data, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  allOrders = data;
  renderStats();
  renderTable();
  populateValueFilter();
}

function renderStats() {
  const counts = { total: allOrders.length };
  Object.keys(STATUS_LABELS).forEach(k => counts[k] = 0);
  allOrders.forEach(o => { if (counts[o.status] !== undefined) counts[o.status]++; });
  const cards = [['إجمالي الطلبات', counts.total], ...Object.entries(STATUS_LABELS).map(([k,l]) => [l, counts[k]])];
  document.getElementById('statsGrid').innerHTML = cards.map(([lbl,num]) => `<div class="stat-card"><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`).join('');
}

function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const filtered = allOrders.filter(o => {
    const matchesQ = !q || o.order_number.toLowerCase().includes(q) || o.parent_name.toLowerCase().includes(q) || (o.phone||'').includes(q);
    const matchesStatus = !statusFilter || o.status === statusFilter;
    return matchesQ && matchesStatus;
  });
  document.getElementById('ordersBody').innerHTML = filtered.map(o => `
    <tr>
      <td>${o.order_number} ${o.is_new ? '<span class="new-badge">جديد</span>' : ''}</td>
      <td>${o.parent_name}</td>
      <td>${o.child_name}</td>
      <td>${o.product_title}</td>
      <td>${new Date(o.created_at).toLocaleDateString('ar-SA')}</td>
      <td><span class="badge" style="background:${STATUS_COLORS[o.status]};">${STATUS_LABELS[o.status]}</span></td>
      <td><button class="btn btn-outline" style="padding:6px 16px;font-size:.8rem;" onclick="openDetail('${o.id}')">عرض</button></td>
    </tr>
  `).join('') || `<tr><td colspan="7" style="text-align:center;color:var(--clr-ink-soft);padding:30px;">لا توجد نتائج</td></tr>`;
}

function openDetail(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  const photosHtml = (o.photo_urls || []).map(u => `<a href="${u}" target="_blank" class="btn btn-outline" style="padding:6px 14px;font-size:.78rem;margin:3px;">صورة</a>`).join('') || 'لا توجد صور';

  document.getElementById('detailModal').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h3>تفاصيل الطلب ${o.order_number} ${o.is_new ? '<span class="new-badge">جديد</span>' : ''}</h3>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:.78rem;" onclick="copyOrderDetails('${o.id}')">نسخ التفاصيل</button>
    </div>
    <div id="detailFields">
      <div class="detail-row"><b>ولي الأمر</b><span>${o.parent_name}</span></div>
      <div class="detail-row"><b>الجوال</b><span>${o.phone}</span></div>
      <div class="detail-row"><b>البريد الإلكتروني</b><span>${o.email || '—'}</span></div>
      <div class="detail-row"><b>المدينة</b><span>${o.city}</span></div>
      <div class="detail-row"><b>اسم الطفل</b><span>${o.child_name}</span></div>
      <div class="detail-row"><b>عمر الطفل</b><span>${o.child_age || '—'}</span></div>
      <div class="detail-row"><b>جنس الطفل</b><span>${o.child_gender || '—'}</span></div>
      <div class="detail-row"><b>معلومة عن الطفل</b><span>${o.child_note || '—'}</span></div>
      <div class="detail-row"><b>المنتج</b><span>${o.product_title} (${o.product_price} ريال)</span></div>
      <div class="detail-row"><b>القيمة المطلوبة</b><span>${o.story_value || '—'}</span></div>
      <div class="detail-row"><b>الإهداء</b><span>${o.dedication_text ? (o.dedication_type==='named' ? 'باسم: '+o.dedication_text : o.dedication_text) : '—'}</span></div>
      <div class="detail-row"><b>هواية/تفصيلة للقصة</b><span>${o.hobby_detail || '—'}</span></div>
      <div class="detail-row"><b>موافقة الخصوصية</b><span>${o.consent_privacy ? 'موافق ✅' : 'غير موافق ❌'}</span></div>
      <div class="detail-row"><b>الصور</b><span>${photosHtml}</span></div>
      <div class="detail-row"><b>سند التحويل</b><span>${o.receipt_url ? `<a href="${o.receipt_url}" target="_blank">عرض السند</a>` : 'لم يُرفع بعد'}</span></div>
    </div>

    <label style="margin-top:18px;">تغيير الحالة</label>
    <select id="statusSelect">
      ${Object.entries(STATUS_LABELS).map(([k,l]) => `<option value="${k}" ${k===o.status?'selected':''}>${l}</option>`).join('')}
    </select>
    <button class="btn btn-block" style="margin-top:14px;" onclick="updateStatus('${o.id}')">حفظ الحالة</button>
    <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="closeDetail()">إغلاق</button>
    <div id="detailMsg"></div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function copyOrderDetails(id) {
  const o = allOrders.find(x => x.id === id);
  const text = `طلب ${o.order_number}
ولي الأمر: ${o.parent_name}
الجوال: ${o.phone}
البريد: ${o.email || '—'}
المدينة: ${o.city}
اسم الطفل: ${o.child_name}
عمر الطفل: ${o.child_age || '—'}
جنس الطفل: ${o.child_gender || '—'}
معلومة عن الطفل: ${o.child_note || '—'}
المنتج: ${o.product_title} (${o.product_price} ريال)
القيمة المطلوبة: ${o.story_value || '—'}
الإهداء: ${o.dedication_text || '—'}
هواية/تفصيلة: ${o.hobby_detail || '—'}
الصور: ${(o.photo_urls||[]).join(' | ') || '—'}
سند التحويل: ${o.receipt_url || '—'}
الحالة: ${STATUS_LABELS[o.status]}`;
  navigator.clipboard.writeText(text).then(() => alert('تم نسخ تفاصيل الطلب ✅'));
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

async function updateStatus(id) {
  const newStatus = document.getElementById('statusSelect').value;
  const { error } = await supabaseClient.from('orders').update({ status: newStatus, is_new: false }).eq('id', id);
  const msgEl = document.getElementById('detailMsg');
  msgEl.innerHTML = error ? `<div class="error-box">فشل التحديث: ${error.message}</div>` : `<div class="success-box">تم تحديث الحالة بنجاح</div>`;
}

document.getElementById('detailOverlay').addEventListener('click', (e) => { if (e.target.id === 'detailOverlay') closeDetail(); });
document.getElementById('productOverlay').addEventListener('click', (e) => { if (e.target.id === 'productOverlay') closeProductForm(); });

/* ===================== المنتجات ===================== */
async function loadProducts() {
  const { data, error } = await supabaseClient.from('products').select('*').order('sort_order', { ascending: true });
  if (error) { console.error(error); return; }
  allProducts = data;
  renderProductsAdmin();
}

function renderProductsAdmin() {
  document.getElementById('productsGridAdmin').innerHTML = allProducts.map(p => `
    <div class="product-card-admin ${p.active ? '' : 'inactive'}">
      <img src="${p.image_url || ''}" alt="${p.title}" onerror="this.style.display='none'">
      <div class="pc-body">
        <div style="font-weight:800;margin-bottom:4px;">${p.title}</div>
        <div style="font-size:.82rem;color:var(--clr-ink-soft);margin-bottom:8px;">${p.tag || ''} — ${p.price} ريال ${p.active ? '' : '(غير مفعّل)'}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline" style="padding:6px 14px;font-size:.78rem;" onclick='openProductForm(${JSON.stringify(p).replace(/'/g,"&#39;")})'>تعديل</button>
          <button class="btn btn-outline" style="padding:6px 14px;font-size:.78rem;" onclick="deleteProduct('${p.id}')">حذف</button>
        </div>
      </div>
    </div>
  `).join('') || '<p style="color:var(--clr-ink-soft);">لا توجد منتجات بعد.</p>';
}

function openProductForm(p) {
  const isEdit = !!p;
  document.getElementById('productModal').innerHTML = `
    <h3 style="margin-bottom:14px;">${isEdit ? 'تعديل منتج' : 'إضافة منتج جديد'}</h3>
    <label class="required">اسم المنتج</label>
    <input type="text" id="pTitle" value="${isEdit ? p.title : ''}">
    <label>الوسم/القيمة (تظهر كشارة على البطاقة)</label>
    <input type="text" id="pTag" value="${isEdit ? (p.tag||'') : ''}">
    <label class="required">السعر (ريال)</label>
    <input type="number" id="pPrice" value="${isEdit ? p.price : 0}">
    <label>الوصف</label>
    <textarea id="pDesc">${isEdit ? (p.description||'') : ''}</textarea>
    <label>صورة المنتج</label>
    <input type="file" id="pImage" accept="image/*">
    ${isEdit && p.image_url ? `<p class="hint">الصورة الحالية موجودة — ارفع صورة جديدة فقط إذا أردت استبدالها.</p>` : ''}
    <label style="display:flex;align-items:center;gap:8px;margin-top:14px;">
      <input type="checkbox" id="pActive" style="width:auto;" ${(!isEdit || p.active) ? 'checked' : ''}> مفعّل ويظهر في الموقع
    </label>
    <button class="btn btn-block" style="margin-top:16px;" onclick="saveProduct(${isEdit ? `'${p.id}'` : 'null'})">حفظ</button>
    <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="closeProductForm()">إلغاء</button>
    <div id="productMsg"></div>
  `;
  document.getElementById('productOverlay').classList.add('open');
}
function closeProductForm() { document.getElementById('productOverlay').classList.remove('open'); }

async function saveProduct(id) {
  const msgEl = document.getElementById('productMsg');
  msgEl.innerHTML = '<span class="spinner" style="border-top-color:var(--clr-primary);"></span> جاري الحفظ...';
  try {
    let imageUrl = null;
    const imgFile = document.getElementById('pImage').files[0];
    if (imgFile) imageUrl = await uploadFileToDrive(imgFile, 'products');

    const payload = {
      title: document.getElementById('pTitle').value.trim(),
      tag: document.getElementById('pTag').value.trim(),
      price: parseFloat(document.getElementById('pPrice').value) || 0,
      description: document.getElementById('pDesc').value.trim(),
      active: document.getElementById('pActive').checked,
    };
    if (imageUrl) payload.image_url = imageUrl;

    const { error } = id
      ? await supabaseClient.from('products').update(payload).eq('id', id)
      : await supabaseClient.from('products').insert(payload);

    if (error) throw error;
    closeProductForm();
    loadProducts();
  } catch (err) {
    msgEl.innerHTML = `<div class="error-box">فشل الحفظ: ${err.message}</div>`;
  }
}

async function deleteProduct(id) {
  if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
  await supabaseClient.from('products').delete().eq('id', id);
  loadProducts();
}

/* ===================== الإحصائيات والتسويق ===================== */
function populateValueFilter() {
  const values = [...new Set(allOrders.map(o => o.story_value).filter(Boolean))];
  const el = document.getElementById('fValue');
  el.innerHTML = '<option value="">كل القيم</option>' + values.map(v => `<option value="${v}">${v}</option>`).join('');
}

function getFilteredOrders() {
  const name = document.getElementById('fName').value.trim().toLowerCase();
  const age = document.getElementById('fAge').value;
  const gender = document.getElementById('fGender').value;
  const city = document.getElementById('fCity').value.trim().toLowerCase();
  const value = document.getElementById('fValue').value;
  return allOrders.filter(o =>
    (!name || o.child_name.toLowerCase().includes(name) || o.parent_name.toLowerCase().includes(name)) &&
    (!age || o.child_age === age) &&
    (!gender || o.child_gender === gender) &&
    (!city || (o.city||'').toLowerCase().includes(city)) &&
    (!value || o.story_value === value)
  );
}

function countBy(arr, keyFn) {
  const map = {};
  arr.forEach(item => { const k = keyFn(item) || 'غير محدد'; map[k] = (map[k]||0) + 1; });
  return map;
}

function renderCharts() {
  const filtered = getFilteredOrders();
  document.getElementById('filterCount').textContent = filtered.length;

  const palette = ['#D85A30','#FAC775','#2F6E68','#B94826','#8A6A57','#3F8E86','#E8813F','#1F4E4A'];

  drawChart('chartGender', 'doughnut', countBy(filtered, o => o.child_gender), palette);
  drawChart('chartAge', 'bar', countBy(filtered, o => o.child_age ? o.child_age + ' سنوات' : null), palette, true);

  const cityCounts = countBy(filtered, o => o.city);
  drawChart('chartCity', 'bar', topN(cityCounts, 8), palette, true);

  const valueCounts = countBy(filtered, o => o.story_value);
  drawChart('chartValue', 'bar', topN(valueCounts, 8), palette, true);

  const weekdays = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const weekdayCounts = {};
  weekdays.forEach(w => weekdayCounts[w] = 0);
  filtered.forEach(o => { weekdayCounts[weekdays[new Date(o.created_at).getDay()]]++; });
  drawChart('chartWeekday', 'bar', weekdayCounts, palette, true);

  const monthCounts = {};
  filtered.forEach(o => {
    const d = new Date(o.created_at);
    const key = d.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long' });
    monthCounts[key] = (monthCounts[key]||0) + 1;
  });
  drawChart('chartMonth', 'bar', monthCounts, palette, true);
}

function topN(obj, n) {
  return Object.fromEntries(Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0, n));
}

function drawChart(canvasId, type, dataObj, palette, horizontal) {
  const ctx = document.getElementById(canvasId);
  if (charts[canvasId]) charts[canvasId].destroy();
  const labels = Object.keys(dataObj);
  const values = Object.values(dataObj);
  charts[canvasId] = new Chart(ctx, {
    type,
    data: { labels, datasets: [{ data: values, backgroundColor: palette }] },
    options: {
      indexAxis: horizontal ? 'y' : 'x',
      plugins: { legend: { display: type === 'doughnut' } },
      scales: type === 'doughnut' ? {} : { x: { beginAtZero: true } },
    }
  });
}
</script>
</body>
