<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | بطلي</title>
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:var(--clr-cream);}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px;background:var(--clr-paper);box-shadow:var(--shadow-soft);
}
.wrap{max-width:1180px;margin:0 auto;padding:24px;}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:26px;}
.stat-card{background:var(--clr-paper);border-radius:16px;padding:18px;text-align:center;box-shadow:var(--shadow-soft);}
.stat-card .num{font-size:1.6rem;font-weight:900;color:var(--clr-primary);}
.stat-card .lbl{font-size:.78rem;color:var(--clr-ink-soft);margin-top:4px;}
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input,.toolbar select{width:auto;flex:1;min-width:180px;}
.overlay{position:fixed;inset:0;background:rgba(20,12,8,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--clr-paper);border-radius:20px;max-width:600px;width:100%;max-height:86vh;overflow-y:auto;padding:26px;}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid color-mix(in srgb, var(--clr-ink) 8%, transparent);font-size:.9rem;}
.detail-row b{color:var(--clr-ink-soft);font-weight:600;}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(3,1fr);} table{font-size:.78rem;} th,td{padding:8px 6px;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" style="margin:0;">📖 <span>لوحة تحكم بطلي</span></div>
  <button class="btn btn-outline" id="logoutBtn">تسجيل الخروج</button>
</div>

<div class="wrap">
  <div class="stats-grid" id="statsGrid"></div>

  <div class="card">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="ابحث برقم الطلب / الاسم / الجوال">
      <select id="statusFilter">
        <option value="">كل الحالات</option>
      </select>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>رقم الطلب</th><th>العميل</th><th>الطفل</th><th>المنتج</th><th>التاريخ</th><th>الحالة</th><th></th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal"></div>
</div>

<script src="../shared/config.js"></script>
<script>
let allOrders = [];

// حماية الصفحة: تحويل لصفحة الدخول إن لم يكن مسجّلاً
supabaseClient.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return; }
  init();
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
  window.location.href = 'login.html';
});

function init() {
  // تعبئة قائمة فلترة الحالات
  const filterEl = document.getElementById('statusFilter');
  Object.entries(STATUS_LABELS).forEach(([key, label]) => {
    const opt = document.createElement('option');
    opt.value = key; opt.textContent = label;
    filterEl.appendChild(opt);
  });

  loadOrders();

  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('statusFilter').addEventListener('change', renderTable);

  // تحديث تلقائي فوري بدون إعادة تحميل الصفحة
  supabaseClient
    .channel('orders-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, loadOrders)
    .subscribe();
}

async function loadOrders() {
  const { data, error } = await supabaseClient
    .from('orders')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  allOrders = data;
  renderStats();
  renderTable();
}

function renderStats() {
  const counts = {
    total: allOrders.length,
    awaiting_payment: 0, paid: 0,
    in_progress: 0, // designing + awaiting_client_approval + ready_to_print + printing + shipped
    completed: 0, cancelled: 0,
  };
  const inProgressSet = ['designing','awaiting_client_approval','ready_to_print','printing','shipped'];
  allOrders.forEach(o => {
    if (o.status === 'awaiting_payment') counts.awaiting_payment++;
    else if (o.status === 'paid') counts.paid++;
    else if (inProgressSet.includes(o.status)) counts.in_progress++;
    else if (o.status === 'completed') counts.completed++;
    else if (o.status === 'cancelled') counts.cancelled++;
  });

  const cards = [
    ['إجمالي الطلبات', counts.total],
    ['بانتظار الدفع', counts.awaiting_payment],
    ['تم الدفع', counts.paid],
    ['قيد التنفيذ', counts.in_progress],
    ['مكتملة', counts.completed],
    ['ملغاة', counts.cancelled],
  ];
  document.getElementById('statsGrid').innerHTML = cards.map(([lbl, num]) => `
    <div class="stat-card"><div class="num">${num}</div><div class="lbl">${lbl}</div></div>
  `).join('');
}

function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;

  const filtered = allOrders.filter(o => {
    const matchesQ = !q || o.order_number.toLowerCase().includes(q) ||
      o.parent_name.toLowerCase().includes(q) || o.phone.includes(q);
    const matchesStatus = !statusFilter || o.status === statusFilter;
    return matchesQ && matchesStatus;
  });

  document.getElementById('ordersBody').innerHTML = filtered.map(o => `
    <tr>
      <td>${o.order_number}</td>
      <td>${o.parent_name}</td>
      <td>${o.child_name}</td>
      <td>${o.product_title}</td>
      <td>${new Date(o.created_at).toLocaleDateString('ar-SA')}</td>
      <td><span class="badge" style="background:${STATUS_COLORS[o.status]};">${STATUS_LABELS[o.status]}</span></td>
      <td><button class="btn btn-outline" style="padding:6px 16px;font-size:.8rem;" onclick="openDetail('${o.id}')">عرض</button></td>
    </tr>
  `).join('') || `<tr><td colspan="7" style="text-align:center;color:var(--clr-ink-soft);padding:30px;">لا توجد نتائج</td></tr>`;
}

function openDetail(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;

  const photosHtml = (o.photo_urls || []).map(u => `<a href="${u}" target="_blank" class="btn btn-outline" style="padding:6px 14px;font-size:.78rem;margin:3px;">صورة</a>`).join('') || 'لا توجد صور';

  document.getElementById('detailModal').innerHTML = `
    <h3 style="margin-bottom:14px;">تفاصيل الطلب ${o.order_number}</h3>

    <div class="detail-row"><b>ولي الأمر</b><span>${o.parent_name}</span></div>
    <div class="detail-row"><b>الجوال</b><span>${o.phone}</span></div>
    <div class="detail-row"><b>البريد الإلكتروني</b><span>${o.email || '—'}</span></div>
    <div class="detail-row"><b>المدينة</b><span>${o.city}</span></div>
    <div class="detail-row"><b>اسم الطفل</b><span>${o.child_name}</span></div>
    <div class="detail-row"><b>عمر الطفل</b><span>${o.child_age || '—'}</span></div>
    <div class="detail-row"><b>جنس الطفل</b><span>${o.child_gender || '—'}</span></div>
    <div class="detail-row"><b>معلومة عن الطفل</b><span>${o.child_note || '—'}</span></div>
    <div class="detail-row"><b>المنتج</b><span>${o.product_title} (${o.product_price} ريال)</span></div>
    <div class="detail-row"><b>القيمة المطلوبة</b><span>${o.story_value || '—'}</span></div>
    <div class="detail-row"><b>الإهداء</b><span>${o.dedication_text ? (o.dedication_type==='named' ? 'باسم: '+o.dedication_text : o.dedication_text) : '—'}</span></div>
    <div class="detail-row"><b>هواية/تفصيلة للقصة</b><span>${o.hobby_detail || '—'}</span></div>
    <div class="detail-row"><b>موافقة الخصوصية</b><span>${o.consent_privacy ? 'موافق ✅' : 'غير موافق ❌'}</span></div>
    <div class="detail-row"><b>الصور</b><span>${photosHtml}</span></div>
    <div class="detail-row"><b>سند التحويل</b><span>${o.receipt_url ? `<a href="${o.receipt_url}" target="_blank">عرض السند</a>` : 'لم يُرفع بعد'}</span></div>

    <label style="margin-top:18px;">تغيير الحالة</label>
    <select id="statusSelect">
      ${Object.entries(STATUS_LABELS).map(([k,l]) => `<option value="${k}" ${k===o.status?'selected':''}>${l}</option>`).join('')}
    </select>
    <button class="btn btn-block" style="margin-top:14px;" onclick="updateStatus('${o.id}')">حفظ الحالة</button>
    <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="closeDetail()">إغلاق</button>
    <div id="detailMsg"></div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

async function updateStatus(id) {
  const newStatus = document.getElementById('statusSelect').value;
  const { error } = await supabaseClient.from('orders').update({ status: newStatus }).eq('id', id);
  const msgEl = document.getElementById('detailMsg');
  if (error) {
    msgEl.innerHTML = `<div class="error-box">فشل التحديث: ${error.message}</div>`;
  } else {
    msgEl.innerHTML = `<div class="success-box">تم تحديث الحالة بنجاح</div>`;
  }
}

document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'detailOverlay') closeDetail();
});
</script>
</body>
</html>
