<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول لوحة التحكم | بطلي</title>
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" style="max-width:420px;margin-top:60px;">
  <div class="brand" style="justify-content:center;">📖 <span>لوحة تحكم بطلي</span></div>
  <div class="card">

    <!-- نموذج الدخول العادي -->
    <form id="loginForm">
      <label class="required">البريد الإلكتروني</label>
      <input type="email" id="email" required>
      <label class="required">كلمة المرور</label>
      <input type="password" id="password" required>
      <button type="submit" class="btn btn-block" id="loginBtn" style="margin-top:20px;">دخول</button>
      <div id="loginMsg"></div>
      <button type="button" id="forgotBtn" style="margin-top:14px;background:none;color:var(--clr-ink-soft);font-size:.85rem;text-decoration:underline;">نسيت كلمة المرور؟</button>
    </form>

    <!-- نموذج إرسال رابط الاستعادة -->
    <form id="forgotForm" style="display:none;">
      <label class="required">أدخل بريدك الإلكتروني لإرسال رابط استعادة كلمة المرور</label>
      <input type="email" id="forgotEmail" required>
      <button type="submit" class="btn btn-block" id="forgotSubmitBtn" style="margin-top:16px;">إرسال رابط الاستعادة</button>
      <button type="button" id="backToLoginBtn" style="margin-top:12px;background:none;color:var(--clr-ink-soft);font-size:.85rem;text-decoration:underline;">رجوع لتسجيل الدخول</button>
      <div id="forgotMsg"></div>
    </form>

    <!-- نموذج تعيين كلمة مرور جديدة (يظهر تلقائياً عند فتح رابط الاستعادة من الإيميل) -->
    <form id="recoveryForm" style="display:none;">
      <p style="color:var(--clr-ink-soft);font-size:.88rem;margin-bottom:14px;">تم التحقق من رابط الاستعادة — أدخل كلمة المرور الجديدة:</p>
      <label class="required">كلمة المرور الجديدة</label>
      <input type="password" id="newPassword" required minlength="6">
      <label class="required">تأكيد كلمة المرور</label>
      <input type="password" id="confirmPassword" required minlength="6">
      <button type="submit" class="btn btn-block" id="recoverySubmitBtn" style="margin-top:16px;">حفظ كلمة المرور الجديدة</button>
      <div id="recoveryMsg"></div>
    </form>

  </div>
</div>

<script src="../shared/config.js"></script>
<script>
const loginForm = document.getElementById('loginForm');
const forgotForm = document.getElementById('forgotForm');
const recoveryForm = document.getElementById('recoveryForm');

let isRecovery = false;

/* اكتشاف رابط استعادة كلمة المرور تلقائياً */
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    isRecovery = true;
    loginForm.style.display = 'none';
    forgotForm.style.display = 'none';
    recoveryForm.style.display = 'block';
  }
});

/* إذا مسجّل دخول مسبقاً (وليس بسبب رابط استعادة)، انتقل للوحة مباشرة */
supabaseClient.auth.getSession().then(({ data }) => {
  setTimeout(() => {
    if (data.session && !isRecovery) window.location.href = 'dashboard.html';
  }, 400);
});

/* تسجيل الدخول العادي */
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const msgEl = document.getElementById('loginMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
  });

  if (error) {
    msgEl.innerHTML = `<div class="error-box">فشل الدخول: بيانات غير صحيحة</div>`;
    btn.disabled = false;
    btn.textContent = 'دخول';
  } else {
    window.location.href = 'dashboard.html';
  }
});

/* التبديل لنموذج "نسيت كلمة المرور" */
document.getElementById('forgotBtn').addEventListener('click', () => {
  loginForm.style.display = 'none';
  forgotForm.style.display = 'block';
});
document.getElementById('backToLoginBtn').addEventListener('click', () => {
  forgotForm.style.display = 'none';
  loginForm.style.display = 'block';
});

/* إرسال رابط الاستعادة */
forgotForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('forgotSubmitBtn');
  const msgEl = document.getElementById('forgotMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { error } = await supabaseClient.auth.resetPasswordForEmail(
    document.getElementById('forgotEmail').value.trim(),
    { redirectTo: window.location.href.split('?')[0].split('#')[0] }
  );

  if (error) {
    msgEl.innerHTML = `<div class="error-box">تعذّر الإرسال: ${error.message}</div>`;
  } else {
    msgEl.innerHTML = `<div class="success-box">تم إرسال رابط الاستعادة إلى بريدك — افتحه وستنتقل تلقائياً لتعيين كلمة مرور جديدة.</div>`;
  }
  btn.disabled = false;
  btn.textContent = 'إرسال رابط الاستعادة';
});

/* حفظ كلمة المرور الجديدة */
recoveryForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('recoverySubmitBtn');
  const msgEl = document.getElementById('recoveryMsg');
  const newPass = document.getElementById('newPassword').value;
  const confirmPass = document.getElementById('confirmPassword').value;

  if (newPass !== confirmPass) {
    msgEl.innerHTML = `<div class="error-box">كلمتا المرور غير متطابقتين</div>`;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { error } = await supabaseClient.auth.updateUser({ password: newPass });

  if (error) {
    msgEl.innerHTML = `<div class="error-box">فشل الحفظ: ${error.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'حفظ كلمة المرور الجديدة';
  } else {
    msgEl.innerHTML = `<div class="success-box">تم تغيير كلمة المرور بنجاح ✅ جاري تحويلك للوحة التحكم...</div>`;
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
  }
});
</script>
</body>
</html>
