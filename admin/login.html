<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول لوحة التحكم | بطلي</title>
<link rel="stylesheet" href="../shared/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" style="max-width:420px;margin-top:60px;">
  <div class="brand" style="justify-content:center;">📖 <span>لوحة تحكم بطلي</span></div>
  <div class="card">
    <form id="loginForm">
      <label class="required">البريد الإلكتروني</label>
      <input type="email" id="email" required>
      <label class="required">كلمة المرور</label>
      <input type="password" id="password" required>
      <button type="submit" class="btn btn-block" id="loginBtn" style="margin-top:20px;">دخول</button>
      <div id="loginMsg"></div>
    </form>
  </div>
</div>

<script src="../shared/config.js"></script>
<script>
// إذا كان مسجّل دخول مسبقاً، انتقل للوحة مباشرة
supabaseClient.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const msgEl = document.getElementById('loginMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
  });

  if (error) {
    msgEl.innerHTML = `<div class="error-box">فشل الدخول: بيانات غير صحيحة</div>`;
    btn.disabled = false;
    btn.textContent = 'دخول';
  } else {
    window.location.href = 'dashboard.html';
  }
});
</script>
</body>
</html>
